openapi: "3.1.0"
info:
  title: "rentmycar_api_v2 API"
  description: "rentmycar_api_v2 API"
  version: "1.0.0"
servers:
  - url: "https://rentmycar_api_v2"
paths:
  /auth/login:
    post:
      description: ""
      requestBody:
        content:
          'application/json':
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            'application/json':
              schema:
                $ref: "#/components/schemas/LoginResponse"
components:
  schemas:
    LoginRequest:
      type: "object"
      properties:
        emailAddress:
          type: "string"
        password:
          type: "string"
      required:
        - "emailAddress"
        - "password"
    LoginResponse:
      type: "object"
      properties:
        accessToken:
          type: "string"
        refreshToken:
          type: "string"
      required:
        - "accessToken"
        - "refreshToken"